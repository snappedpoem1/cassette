name: Windows Package

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  package:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri prerequisites
        shell: pwsh
        run: |
          cargo check --workspace
          Push-Location ui
          npm ci
          npm run build
          Pop-Location

      - name: Build installers
        shell: pwsh
        run: cargo tauri build

      - name: Verify installer artifacts
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path "src-tauri/target/release/bundle/msi" -Filter "*.msi" -ErrorAction SilentlyContinue
          $exe = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*.exe" -ErrorAction SilentlyContinue
          if (-not $msi) { throw "MSI artifact not found" }
          if (-not $exe) { throw "NSIS EXE artifact not found" }

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: cassette-windows-installers
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
